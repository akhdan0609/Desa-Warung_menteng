<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeri — Desa Warung Menteng</title>
  <meta name="description" content="Galeri foto Desa Warung Menteng." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,600;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="images/logo.jpeg" type="image/x-icon"/>
</head>
<body>

<header>
  <div class="container">
    <nav>
      <a href="index.html" class="logo">
        <img src="images/logo.jpeg" alt="Desa Warung Menteng" class="logo-img" />
        Warung Menteng
      </a>
      <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links"></ul>
      <button class="search-toggle" aria-label="Cari" id="searchToggle">&#x1F50D;</button>
    </nav>
    <div class="search-bar" id="searchBar">
      <input type="text" id="searchInput" placeholder="Cari..." />
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
</header>

<div class="search-overlay" id="searchOverlay"></div>

<div class="page-header">
  <div class="container">
    <h1 id="pageHeaderTitle"></h1>
    <p id="pageHeaderDesc"></p>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>
</section>

<footer>
  <div class="container" id="footerContent"></div>
</footer>

<div class="lightbox">
  <div class="lightbox-content"></div>
  <button class="lightbox-close">&times;</button>
</div>

<div class="service-modal" id="serviceModal">
  <div class="service-modal-bg"></div>
  <div class="service-modal-content">
    <button class="service-modal-close">&times;</button>
    <div class="service-modal-icon" id="modalServiceIcon"></div>
    <h3 id="modalServiceName"></h3>
    <p id="modalServiceDesc" style="color:var(--muted);font-size:0.9rem;margin:12px 0 24px;font-weight:300;"></p>
    <div id="modalSuccess" class="service-modal-success">
      <div style="font-size:3rem;margin-bottom:12px;">&#x2705;</div>
      <h3>Pengajuan Terkirim!</h3>
      <p style="color:var(--muted);font-size:0.85rem;margin-top:8px;">Data Anda telah disimpan. Kami akan memproses pengajuan Anda segera.</p>
      <button class="btn btn-primary" id="modalSuccessClose" style="margin-top:20px;">Tutup</button>
    </div>
    <form id="serviceForm">
      <input type="hidden" id="serviceId" />
      <div class="form-group"><label>Nama Lengkap</label><input type="text" id="sName" required /></div>
      <div class="form-group"><label>NIK</label><input type="text" id="sNIK" required /></div>
      <div class="form-group"><label>No. HP</label><input type="tel" id="sPhone" required /></div>
      <div class="form-group"><label>Alamat</label><textarea id="sAddress" required></textarea></div>
      <div class="form-group"><label>Keterangan</label><textarea id="sNotes" placeholder="Opsional"></textarea></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Kirim Pengajuan</button>
    </form>
  </div>
</div>

<div class="status-sidebar-toggle" id="statusToggle">Cek Status</div>
<div class="status-sidebar-panel">
  <div class="status-sidebar-header">
    <h4>Status Pengajuan</h4>
    <button id="statusClose">&times;</button>
  </div>
  <div class="status-sidebar-body" id="statusBody"></div>
</div>

<script src="data/data.js"></script>
<script src="js/script.js"></script>
</body>
</html>
