<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artikel — Desa Warung Menteng</title>
  <meta name="description" content="Baca artikel Desa Warung Menteng." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,600;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="images/logo.png" type="image/x-icon"/>
  <style>
    .artikel-header { margin-bottom: 32px; }
    .artikel-header .category { display: inline-block; font-size: 0.6rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--green); border-bottom: 1px solid var(--green); padding-bottom: 3px; margin-bottom: 12px; }
    .artikel-header h1 { font-size: 2rem; font-weight: 800; color: var(--brown); line-height: 1.2; margin-bottom: 12px; }
    .artikel-header .date { font-size: 0.8rem; color: var(--muted); }
    .artikel-body { max-width: 720px; }
    .artikel-body p { font-size: 1rem; color: var(--brown-light); line-height: 1.9; margin-bottom: 20px; font-weight: 300; }
    .artikel-body h3 { font-size: 1.3rem; font-weight: 700; color: var(--brown); margin-top: 36px; margin-bottom: 12px; }
    .artikel-body ul { padding-left: 20px; margin-bottom: 20px; }
    .artikel-body ul li { list-style: disc; color: var(--brown-light); margin-bottom: 8px; line-height: 1.8; font-weight: 300; }
    .artikel-back { display: inline-flex; align-items: center; gap: 8px; color: var(--green); font-weight: 600; margin-bottom: 32px; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; transition: gap 0.3s; }
    .artikel-back:hover { gap: 16px; }
    @media (max-width: 768px) {
      .artikel-header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <nav>
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="Desa Warung Menteng" class="logo-img" />
        Warung Menteng
      </a>
      <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links"></ul>
      <button class="search-toggle" aria-label="Cari" id="searchToggle">&#x1F50D;</button>
    </nav>
    <div class="search-bar" id="searchBar">
      <input type="text" id="searchInput" placeholder="Cari..." />
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
</header>

<div class="search-overlay" id="searchOverlay"></div>

<section class="section">
  <div class="container" style="max-width:800px;">
    <a href="berita.html" class="artikel-back">&larr; Kembali ke Berita</a>
    <div id="artikelContent">
      <div class="artikel-header">
        <div class="category" id="artikelCategory"></div>
        <h1 id="artikelTitle"></h1>
        <div class="date" id="artikelDate"></div>
      </div>
      <div class="artikel-body" id="artikelBody"></div>
    </div>
    <div id="artikelNotFound" style="display:none;text-align:center;padding:60px 20px;">
      <div style="font-size:3rem;margin-bottom:16px;">&#x1F50D;</div>
      <h2 style="color:var(--brown);">Artikel tidak ditemukan</h2>
      <p style="color:var(--muted);margin-top:8px;">Artikel yang Anda cari tidak tersedia.</p>
      <a href="berita.html" class="btn btn-outline" style="margin-top:20px;">Kembali ke Berita</a>
    </div>
  </div>
</section>

<footer>
  <div class="container" id="footerContent"></div>
</footer>

<div class="lightbox">
  <div class="lightbox-content"></div>
  <button class="lightbox-close">&times;</button>
</div>

<div class="service-modal" id="serviceModal">
  <div class="service-modal-bg"></div>
  <div class="service-modal-content">
    <button class="service-modal-close">&times;</button>
    <div class="service-modal-icon" id="modalServiceIcon"></div>
    <h3 id="modalServiceName"></h3>
    <p id="modalServiceDesc" style="color:var(--muted);font-size:0.9rem;margin:12px 0 24px;font-weight:300;"></p>
    <div id="modalSuccess" class="service-modal-success">
      <div style="font-size:3rem;margin-bottom:12px;">&#x2705;</div>
      <h3>Pengajuan Terkirim!</h3>
      <p style="color:var(--muted);font-size:0.85rem;margin-top:8px;">Data Anda telah disimpan. Kami akan memproses pengajuan Anda segera.</p>
      <button class="btn btn-primary" id="modalSuccessClose" style="margin-top:20px;">Tutup</button>
    </div>
    <form id="serviceForm">
      <input type="hidden" id="serviceId" />
      <div class="form-group"><label>Nama Lengkap</label><input type="text" id="sName" required /></div>
      <div class="form-group"><label>NIK</label><input type="text" id="sNIK" required /></div>
      <div class="form-group"><label>No. HP</label><input type="tel" id="sPhone" required /></div>
      <div class="form-group"><label>Alamat</label><textarea id="sAddress" required></textarea></div>
      <div class="form-group"><label>Keterangan</label><textarea id="sNotes" placeholder="Opsional"></textarea></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Kirim Pengajuan</button>
    </form>
  </div>
</div>

<div class="status-sidebar-toggle" id="statusToggle">Cek Status</div>
<div class="status-sidebar-panel">
  <div class="status-sidebar-header">
    <h4>Status Pengajuan</h4>
    <button id="statusClose">&times;</button>
  </div>
  <div class="status-sidebar-body" id="statusBody"></div>
</div>

<script src="data/data.js"></script>
<script src="js/script.js"></script>
</body>
</html>
